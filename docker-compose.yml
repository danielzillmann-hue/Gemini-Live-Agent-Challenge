services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-genesis-rpg}
      - GOOGLE_CLOUD_REGION=${GOOGLE_CLOUD_REGION:-us-central1}
      - GEMINI_MODEL=gemini-2.5-pro
      - GEMINI_FLASH_MODEL=gemini-2.5-flash
      - IMAGEN_MODEL=imagen-4
      - VEO_MODEL=veo-3
      - STORAGE_BUCKET=${STORAGE_BUCKET:-genesis-rpg-media}
      - CORS_ORIGINS=http://localhost:3000
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./credentials.json}:/app/credentials.json:ro

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
