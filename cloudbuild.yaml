steps:
  # Build backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:$SHORT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:latest"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  # Push backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:latest"

  # Deploy backend
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "genesis-backend"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:$SHORT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "3600"
      - "--session-affinity"
      - "--min-instances"
      - "1"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=us-central1,STORAGE_BUCKET=$PROJECT_ID-media,CORS_ORIGINS=*,GOOGLE_GENAI_USE_VERTEXAI=1"

  # Build frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:$SHORT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:latest"
      - "-f"
      - "frontend/Dockerfile"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=https://genesis-backend-241457909657.us-central1.run.app"
      - "--build-arg"
      - "NEXT_PUBLIC_WS_URL=wss://genesis-backend-241457909657.us-central1.run.app"
      - "frontend"

  # Push frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:latest"

  # Deploy frontend
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "genesis-frontend"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:$SHORT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--port"
      - "3000"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:$SHORT_SHA"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/backend:latest"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:$SHORT_SHA"
  - "us-central1-docker.pkg.dev/$PROJECT_ID/genesis/frontend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
