steps:
  # Build and deploy backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/backend:${SHORT_SHA}"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/backend:${SHORT_SHA}"

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "genesis-backend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/backend:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "300"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},STORAGE_BUCKET=${PROJECT_ID}-media,CORS_ORIGINS=${_FRONTEND_URL}"
      - "--session-affinity"

  # Build and deploy frontend
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/frontend:${SHORT_SHA}"
      - "-f"
      - "frontend/Dockerfile"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_WS_URL=${_BACKEND_WS_URL}"
      - "frontend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/frontend:${SHORT_SHA}"

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "genesis-frontend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/frontend:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"

substitutions:
  _REGION: "us-central1"
  _FRONTEND_URL: "https://genesis-frontend-HASH.run.app"
  _BACKEND_URL: "https://genesis-backend-HASH.run.app"
  _BACKEND_WS_URL: "wss://genesis-backend-HASH.run.app"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/backend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/genesis/frontend:${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY
